# The title of your site (will be shown in the browser tab)
title: Implementing Interpreters

# The name of your site (will be shown in the header)
name: Implementing Interpreters

# A short description of your site for SEO
description: A university course on implementing interpreters using Python.

# The markdown processor
markdown: GFM

# ----------------- THEME CONFIGURATION ----------------- #
# Set the theme
plugins:
  - jekyll-remote-theme
remote_theme: just-the-docs/just-the-docs@v0.7.0

# (Optional) Set a default color scheme. 
# 'light', 'dark', or omit to respect user's browser/OS setting.
color_scheme: light

# (Optional but Recommended) Add a link to the GitHub repo in the header
aux_links:
  "View on GitHub":
    - "https://github.com/karlo-babic/interpreters"
